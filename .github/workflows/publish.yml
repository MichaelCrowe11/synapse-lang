name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint (non-blocking)
        run: |
          if command -v ruff; then ruff check synapse_lang || true; fi
          if command -v flake8; then flake8 synapse_lang || true; fi
      - name: Type check (non-blocking)
        run: |
          if command -v mypy; then mypy synapse_lang || true; fi
      - name: Run release test suite
        run: |
          pytest \
            tests/test_enhanced_parser.py \
            tests/test_parser_comprehensive.py \
            tests/test_quantum_circuits.py \
            tests/test_integration_quantum.py \
            tests/test_comprehensive.py \
            tests/test_minimal_parser.py \
            tests/test_type_inference.py \
            tests/unit/test_uncertainty.py \
            tests/integration/ \
            -q --tb=short
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "TAG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install build & tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Verify version matches tag
        run: |
          # Prefer pyproject.toml version; fallback to setup.py
          if [ -f pyproject.toml ]; then
            FILE_VERSION=$(grep -E '^version *= *"' pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          fi
          if [ -z "$FILE_VERSION" ] && [ -f setup.py ]; then
            FILE_VERSION=$(python -c "import re, pathlib; txt=pathlib.Path('setup.py').read_text(); m=re.search(r'version=\\\"([^\\\"]+)\\\"', txt); print(m.group(1) if m else '0.0.0')")
          fi
          if [ -z "$FILE_VERSION" ]; then FILE_VERSION="0.0.0"; fi
          echo "File version: $FILE_VERSION";
          echo "Tag version: $TAG_VERSION";
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then echo "Version mismatch"; exit 1; fi
      - name: Build
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
            password: ${{ secrets.PYPI_TOKEN }}
            print-hash: true
