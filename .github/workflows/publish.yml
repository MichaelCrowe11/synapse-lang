name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint (non-blocking)
        run: |
          if command -v ruff; then ruff check synapse_lang || true; fi
          if command -v flake8; then flake8 synapse_lang || true; fi
      - name: Type check (non-blocking)
        run: |
          if command -v mypy; then mypy synapse_lang || true; fi
      - name: Run release test suite
        run: |
          pytest \
            tests/test_enhanced_parser.py \
            tests/test_parser_comprehensive.py \
            tests/test_quantum_circuits.py \
            tests/test_integration_quantum.py \
            tests/test_comprehensive.py \
            tests/test_minimal_parser.py \
            tests/test_type_inference.py \
            tests/unit/test_uncertainty.py \
            tests/integration/ \
            -q --tb=short
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Extract tag version
        id: tag
        run: echo "TAG_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install build & tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Verify version matches tag
        run: |
          python - <<'PY'
          import os, re, pathlib, sys
          tag = os.environ.get("TAG_VERSION", "").strip()
          text = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, re.M)
          file_version = m.group(1).strip() if m else ""
          if not file_version and pathlib.Path("setup.py").exists():
              st = pathlib.Path("setup.py").read_text(encoding="utf-8")
              m2 = re.search(r'version\s*=\s*"([^"]+)"', st)
              file_version = m2.group(1).strip() if m2 else ""
          print(f"File version: {file_version!r}")
          print(f"Tag version: {tag!r}")
          if file_version != tag:
              sys.exit("Version mismatch")
          PY
      - name: Build
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download dist artifacts
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
            password: ${{ secrets.PYPI_TOKEN }}
            print-hash: true
